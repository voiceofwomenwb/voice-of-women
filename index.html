<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voice of Women</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <div class="hero">

    <h1>Voice of Women</h1>

    <h2>Public Petition Platform</h2>

    <p class="description">
      Support women whose Annapurna Yojana applications are still showing
      "Under Enquiry" or "Under Processing".
    </p>

    <div class="counter-box">
      <p>Current Supporters</p>
      <div class="counter-number">0</div>
    </div>

   <button class="btn" onclick="showForm()">
      Sign Petition
    </button>
<div id="petitionForm" style="display:none; margin-top:20px;">

  <input id="name" type="text" placeholder="Full Name"
  style="width:100%;padding:12px;margin:8px 0;">

  <input id="district" type="text" placeholder="District"
  style="width:100%;padding:12px;margin:8px 0;">

  <input id="mobile" type="text" placeholder="Mobile (Optional)"
  style="width:100%;padding:12px;margin:8px 0;">

  <label>
    <input id="support" type="checkbox">
    I support this petition
  </label>

  <br><br>

  <button class="btn" onclick="submitPetition()">
    Submit Petition
  </button>

</div>

    <p class="footer-text">
      Together we can raise our voice for eligible women waiting for support.
    </p>

  </div>
</div>
<script src="script.js"></script>
</body>
</html>
