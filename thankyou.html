<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You - Voice of Women</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:Arial,sans-serif;
      background:#f5f7ff;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      padding:20px;
    }

    .card{
      background:white;
      max-width:500px;
      width:100%;
      padding:40px 25px;
      border-radius:20px;
      text-align:center;
      box-shadow:0 10px 30px rgba(0,0,0,0.08);
    }

    .check{
      font-size:70px;
      margin-bottom:15px;
    }

    h1{
      color:#4f46e5;
      margin-bottom:15px;
    }

    p{
      color:#555;
      line-height:1.7;
      margin-bottom:25px;
    }

    .btn{
      display:inline-block;
      background:#4f46e5;
      color:white;
      text-decoration:none;
      padding:14px 24px;
      border-radius:10px;
    }
  </style>
</head>
<body>

<div class="card">

  <div class="check">✅</div>

  <h1>Petition Submitted</h1>

  <p>
    Thank you for supporting this petition.
    Your voice matters and helps strengthen our collective demand.
  </p>

  <a href="index.html" class="btn">
    Back to Home
  </a>

</div>

</body>
</html>
